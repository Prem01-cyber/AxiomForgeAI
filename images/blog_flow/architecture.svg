<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #0F172A; }
      .label { font-size: 13px; font-weight: 700; fill: #0F172A; }
      .small { font-size: 11px; fill: #475569; }
      .note { font-size: 10px; fill: #64748B; }
      .line { fill: none; stroke: #475569; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="270" y="18" width="360" height="42" rx="8" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="450" y="45" text-anchor="middle" class="title">AxiomForgeAI Training Loop</text>

  <rect x="48" y="92" width="184" height="154" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="140" y="120" text-anchor="middle" class="label">Task source</text>
  <rect x="70" y="142" width="140" height="36" rx="7" fill="#ECFDF5" stroke="#86A789"/>
  <text x="140" y="165" text-anchor="middle" class="small">Grounded dataset</text>
  <rect x="70" y="190" width="140" height="36" rx="7" fill="#EEF2FF" stroke="#A5B4FC"/>
  <text x="140" y="213" text-anchor="middle" class="small">Self-play curriculum</text>

  <rect x="286" y="128" width="154" height="82" rx="10" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="363" y="158" text-anchor="middle" class="label">Selected problem</text>
  <text x="363" y="178" text-anchor="middle" class="small">gold answer or</text>
  <text x="363" y="194" text-anchor="middle" class="small">model-written question</text>

  <rect x="494" y="128" width="150" height="82" rx="10" fill="#EAF0F7" stroke="#93B5D8"/>
  <text x="569" y="158" text-anchor="middle" class="label">Math model</text>
  <text x="569" y="178" text-anchor="middle" class="small">samples K candidate</text>
  <text x="569" y="194" text-anchor="middle" class="small">solutions</text>

  <rect x="698" y="128" width="154" height="82" rx="10" fill="#F1F5F9" stroke="#94A3B8"/>
  <text x="775" y="158" text-anchor="middle" class="label">Environment scores</text>
  <text x="775" y="178" text-anchor="middle" class="small">answer, steps, chain,</text>
  <text x="775" y="194" text-anchor="middle" class="small">format, question quality</text>

  <rect x="344" y="278" width="212" height="48" rx="10" fill="#F5F3FF" stroke="#A78BFA"/>
  <text x="450" y="307" text-anchor="middle" class="label">GRPO group comparison</text>

  <path class="line" d="M232 169 L286 169"/>
  <path class="line" d="M440 169 L494 169"/>
  <path class="line" d="M644 169 L698 169"/>
  <path class="line" d="M775 210 L556 278"/>
  <path d="M344 302 C210 302 140 270 140 246" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="242" y="326" text-anchor="middle" class="note">updated model returns to the next batch</text>
</svg>
