<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" width="920" height="460">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #0F172A; }
      .label { font-size: 13px; font-weight: 700; fill: #0F172A; }
      .small { font-size: 11px; fill: #475569; }
      .note { font-size: 10px; fill: #64748B; }
      .line { fill: none; stroke: #475569; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="280" y="18" width="360" height="42" rx="8" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="460" y="45" text-anchor="middle" class="title">AxiomForgeAI Training Loop</text>

  <rect x="360" y="82" width="200" height="58" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="460" y="107" text-anchor="middle" class="label">Phase controller</text>
  <text x="460" y="126" text-anchor="middle" class="small">grounded first, then ramp</text>

  <rect x="110" y="170" width="230" height="76" rx="10" fill="#ECFDF5" stroke="#86A789"/>
  <text x="225" y="200" text-anchor="middle" class="label">Grounded path</text>
  <text x="225" y="220" text-anchor="middle" class="small">dataset problem + gold answer</text>

  <rect x="580" y="170" width="230" height="76" rx="10" fill="#EEF2FF" stroke="#A5B4FC"/>
  <text x="695" y="200" text-anchor="middle" class="label">Self-play path</text>
  <text x="695" y="220" text-anchor="middle" class="small">curriculum target -> question</text>

  <rect x="350" y="280" width="220" height="58" rx="10" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="460" y="305" text-anchor="middle" class="label">Selected problem</text>
  <text x="460" y="324" text-anchor="middle" class="small">one problem enters the group</text>

  <rect x="70" y="382" width="170" height="54" rx="10" fill="#EAF0F7" stroke="#93B5D8"/>
  <text x="155" y="405" text-anchor="middle" class="label">Sample K attempts</text>
  <text x="155" y="423" text-anchor="middle" class="small">same selected problem</text>

  <rect x="290" y="382" width="170" height="54" rx="10" fill="#F1F5F9" stroke="#94A3B8"/>
  <text x="375" y="405" text-anchor="middle" class="label">Score attempts</text>
  <text x="375" y="423" text-anchor="middle" class="small">answer + reasoning</text>

  <rect x="510" y="382" width="170" height="54" rx="10" fill="#F5F3FF" stroke="#A78BFA"/>
  <text x="595" y="405" text-anchor="middle" class="label">GRPO compares</text>
  <text x="595" y="423" text-anchor="middle" class="small">relative rewards</text>

  <rect x="730" y="382" width="130" height="54" rx="10" fill="#ECFDF5" stroke="#86A789"/>
  <text x="795" y="405" text-anchor="middle" class="label">Update policy</text>
  <text x="795" y="423" text-anchor="middle" class="small">next batch</text>

  <path class="line" d="M410 140 L225 170"/>
  <path class="line" d="M510 140 L695 170"/>
  <path class="line" d="M225 246 L350 294"/>
  <path class="line" d="M695 246 L570 294"/>
  <path class="line" d="M460 338 L155 382"/>
  <path class="line" d="M240 409 L290 409"/>
  <path class="line" d="M460 409 L510 409"/>
  <path class="line" d="M680 409 L730 409"/>
  <path d="M795 382 C795 92 600 82 560 110" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="720" y="78" text-anchor="middle" class="note">updated model returns to phase control</text>
</svg>
