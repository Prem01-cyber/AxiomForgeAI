<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; }
      .title { font-size: 19px; font-weight: 700; fill: #0F172A; }
      .label { font-size: 13px; font-weight: 700; fill: #0F172A; }
      .small { font-size: 11px; fill: #475569; }
      .line { fill: none; stroke: #475569; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="260" y="18" width="400" height="40" rx="8" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="460" y="44" text-anchor="middle" class="title">What Gets Checked</text>

  <rect x="30" y="76" width="148" height="162" rx="10" fill="#EAF0F7" stroke="#93B5D8"/>
  <text x="104" y="152" text-anchor="middle" class="label">Attempt</text>
  <text x="104" y="172" text-anchor="middle" class="small">steps + answer</text>

  <rect x="228" y="76" width="400" height="46" rx="10" fill="#ECFDF5" stroke="#86A789"/>
  <text x="428" y="101" text-anchor="middle" class="label">Correctness</text>
  <text x="428" y="116" text-anchor="middle" class="small">gold answer, symbolic match (grounded)</text>

  <rect x="228" y="136" width="400" height="46" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="428" y="161" text-anchor="middle" class="label">Reasoning quality</text>
  <text x="428" y="176" text-anchor="middle" class="small">PRM steps, chain prefix (LCCP), format</text>

  <rect x="228" y="196" width="400" height="46" rx="10" fill="#EEF2FF" stroke="#A5B4FC"/>
  <text x="428" y="221" text-anchor="middle" class="label">Question quality</text>
  <text x="428" y="236" text-anchor="middle" class="small">topic, difficulty, clarity, novelty (self-play)</text>

  <rect x="678" y="76" width="148" height="162" rx="10" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="752" y="152" text-anchor="middle" class="label">Attempt</text>
  <text x="752" y="172" text-anchor="middle" class="label">score</text>

  <path class="line" d="M178 99 L228 99"/>
  <path class="line" d="M178 159 L228 159"/>
  <path class="line" d="M178 219 L228 219"/>
  <path class="line" d="M628 99 L678 99"/>
  <path class="line" d="M628 159 L678 159"/>
  <path class="line" d="M628 219 L678 219"/>
</svg>
