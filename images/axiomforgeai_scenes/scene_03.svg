<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="42 22 636 372" width="636" height="372">
<defs>
  <!-- Arrow marker -->
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6F6C66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4D6F93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#42613B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#716A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Total duration: 10 scenes × 6s = 60s loop -->
  <!-- Each scene: visible 0s–6s within its window, crossfade 0.4s in/out -->
  <!-- Scene offsets (in 60s total): S1=0, S2=6, S3=12, S4=18, S5=24, S6=30, S7=36, S8=42, S9=48, S10=54 -->

  <style>
    text { font-family: Inter, Arial, sans-serif; }
  </style>
</defs>
<g>
  <rect x="96" y="24" width="528" height="46" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>

  <text x="360" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#171715">Two sources of practice</text>
  <text x="360" y="62" text-anchor="middle" font-size="12" fill="#55524D">Grounded keeps training honest. Self-play adds new challenges when ready.</text>

  <!-- Phase controller top -->
  <rect x="268" y="78" width="184" height="48" rx="3" fill="#F0EEF7" stroke="#5E587A" stroke-width="0.75"/>
  <text x="360" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#46405F">Phase controller</text>

  <!-- Fork arrows -->
  <path d="M320 126 L180 162" fill="none" stroke="#42613B" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <path d="M400 126 L540 162" fill="none" stroke="#5E587A" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- LEFT lane: Grounded -->
  <rect x="60" y="162" width="240" height="56" rx="3" fill="#ECF4EA" stroke="#42613B" stroke-width="0.75"/>
  <text x="180" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#2F4A2A">Grounded practice</text>
  <text x="180" y="206" text-anchor="middle" font-size="11" fill="#42613B">GSM8K / MATH dataset</text>

  <line x1="180" y1="218" x2="180" y2="246" stroke="#42613B" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <rect x="90" y="246" width="180" height="36" rx="3" fill="#DDEACF" stroke="#42613B" stroke-width="0.5"/>
  <text x="180" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#24381F">Hidden gold answer</text>

  <!-- RIGHT lane: Self-play -->
  <rect x="420" y="162" width="240" height="56" rx="3" fill="#F0EEF7" stroke="#5E587A" stroke-width="0.75"/>
  <text x="540" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#46405F">Self-play practice</text>
  <text x="540" y="206" text-anchor="middle" font-size="11" fill="#5E587A">Curriculum selects skill + difficulty</text>

  <line x1="540" y1="218" x2="540" y2="246" stroke="#5E587A" stroke-width="1.2" marker-end="url(#arr-purple)"/>

  <rect x="458" y="246" width="164" height="36" rx="3" fill="#D8D3EA" stroke="#5E587A" stroke-width="0.5"/>
  <text x="540" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#37324A">Model-generated question</text>

  <!-- Both converge to K attempts -->
  <path d="M180 282 L310 328" fill="none" stroke="#6F6C66" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M540 282 L410 328" fill="none" stroke="#6F6C66" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="240" y="328" width="240" height="48" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>
  <text x="360" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1D">K solution attempts</text>

</g>
</svg>
