<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="26 22 668 386" width="668" height="386">
<defs>
  <!-- Arrow marker -->
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6F6C66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4D6F93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#42613B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#716A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Total duration: 10 scenes × 6s = 60s loop -->
  <!-- Each scene: visible 0s–6s within its window, crossfade 0.4s in/out -->
  <!-- Scene offsets (in 60s total): S1=0, S2=6, S3=12, S4=18, S5=24, S6=30, S7=36, S8=42, S9=48, S10=54 -->

  <style>
    text { font-family: Inter, Arial, sans-serif; }
  </style>
</defs>
<g>
  <rect x="96" y="24" width="528" height="46" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>

  <text x="360" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#171715">GRPO update</text>
  <text x="360" y="62" text-anchor="middle" font-size="12" fill="#55524D">Stronger reasoning paths become the learning signal</text>

  <!-- Best attempt -->
  <rect x="44" y="86" width="210" height="168" rx="3" fill="#ECF4EA" stroke="#587A4A" stroke-width="1.5"/>
  <text x="149" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#2F4A2A">Strongest attempt</text>
  <text x="149" y="136" text-anchor="middle" font-size="12" fill="#42613B">Correct final answer</text>
  <text x="149" y="156" text-anchor="middle" font-size="12" fill="#42613B">Consistent reasoning steps</text>
  <text x="149" y="176" text-anchor="middle" font-size="12" fill="#42613B">Verified arithmetic</text>
  <text x="149" y="196" text-anchor="middle" font-size="12" fill="#42613B">Clean final format</text>
  <rect x="64" y="210" width="170" height="28" rx="3" fill="#DDEACF" stroke="#42613B" stroke-width="0.5"/>
  <text x="149" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#24381F">Group score: 0.91</text>

  <!-- Arrow to GRPO -->
  <line x1="254" y1="170" x2="310" y2="170" stroke="#716A94" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- GRPO box -->
  <rect x="310" y="138" width="160" height="64" rx="3" fill="#F0EEF7" stroke="#716A94" stroke-width="0.75"/>
  <text x="390" y="166" text-anchor="middle" font-size="14" font-weight="600" fill="#46405F">GRPO update</text>
  <text x="390" y="185" text-anchor="middle" font-size="11" fill="#5E587A">Policy update from contrast</text>

  <!-- Arrow to improved model -->
  <line x1="470" y1="170" x2="530" y2="170" stroke="#716A94" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Improved model -->
  <rect x="530" y="110" width="146" height="120" rx="3" fill="#EAF0F7" stroke="#355C7D" stroke-width="1.5"/>
  <text x="603" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#23415A">Improved</text>
  <text x="603" y="168" text-anchor="middle" font-size="14" font-weight="600" fill="#23415A">model</text>
  <text x="603" y="192" text-anchor="middle" font-size="11" fill="#355C7D">Ready for next</text>
  <text x="603" y="208" text-anchor="middle" font-size="11" fill="#355C7D">batch</text>

  <!-- Loop-back arrow (curved dashed) -->
  <path d="M603 230 Q603 300 390 320 Q180 340 149 280 L149 256" fill="none" stroke="#4D6F93" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr-blue)"/>
  <text x="390" y="342" text-anchor="middle" font-size="11" fill="#355C7D">back to phase controller -> next batch</text>

  <text x="360" y="390" text-anchor="middle" font-size="12" fill="#55524D">Lower-scoring attempts provide contrast for the update</text>

</g>
</svg>
