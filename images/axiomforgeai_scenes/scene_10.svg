<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="2 20 716 368" width="716" height="368">
<defs>
  <!-- Arrow marker -->
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6F6C66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4D6F93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#42613B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#716A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Total duration: 10 scenes × 6s = 60s loop -->
  <!-- Each scene: visible 0s–6s within its window, crossfade 0.4s in/out -->
  <!-- Scene offsets (in 60s total): S1=0, S2=6, S3=12, S4=18, S5=24, S6=30, S7=36, S8=42, S9=48, S10=54 -->

  <style>
    text { font-family: Inter, Arial, sans-serif; }
  </style>
</defs>
<g>
  <rect x="96" y="24" width="528" height="46" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>

  <text x="360" y="38" text-anchor="middle" font-size="19" font-weight="700" fill="#171715">AxiomForgeAI</text>
  <text x="360" y="60" text-anchor="middle" font-size="12" fill="#55524D">Summary of the training system</text>

  <!-- 4 summary pillars -->
  <rect x="20" y="78" width="158" height="226" rx="3" fill="#EAF0F7" stroke="#355C7D" stroke-width="0.75"/>
  <rect x="20" y="78" width="158" height="38" rx="3" fill="#D7E3F1" stroke="none"/>
  <rect x="20" y="104" width="158" height="12" rx="0" fill="#D7E3F1" stroke="none"/>
  <text x="99" y="101" text-anchor="middle" font-size="12" font-weight="600" fill="#203447">Math model</text>
  <text x="99" y="136" text-anchor="middle" font-size="11" fill="#355C7D">Compact model</text>
  <text x="99" y="154" text-anchor="middle" font-size="11" fill="#355C7D">trained through</text>
  <text x="99" y="172" text-anchor="middle" font-size="11" fill="#355C7D">verified feedback</text>
  <text x="99" y="190" text-anchor="middle" font-size="11" fill="#355C7D">on reasoning</text>
  <text x="99" y="208" text-anchor="middle" font-size="11" fill="#355C7D">and answers.</text>
  <text x="99" y="226" text-anchor="middle" font-size="11" fill="#355C7D">The loop improves</text>
  <text x="99" y="244" text-anchor="middle" font-size="11" fill="#355C7D">future attempts.</text>

  <rect x="196" y="78" width="158" height="226" rx="3" fill="#ECF4EA" stroke="#42613B" stroke-width="0.75"/>
  <rect x="196" y="78" width="158" height="38" rx="3" fill="#DDEACF" stroke="none"/>
  <rect x="196" y="104" width="158" height="12" rx="0" fill="#DDEACF" stroke="none"/>
  <text x="275" y="101" text-anchor="middle" font-size="12" font-weight="600" fill="#24381F">Two sources</text>
  <text x="275" y="136" text-anchor="middle" font-size="11" fill="#42613B">Grounded problems</text>
  <text x="275" y="154" text-anchor="middle" font-size="11" fill="#42613B">(GSM8K / MATH)</text>
  <text x="275" y="172" text-anchor="middle" font-size="11" fill="#42613B">anchor training.</text>
  <text x="275" y="194" text-anchor="middle" font-size="11" fill="#42613B">Self-play adds</text>
  <text x="275" y="212" text-anchor="middle" font-size="11" fill="#42613B">novel challenges</text>
  <text x="275" y="230" text-anchor="middle" font-size="11" fill="#42613B">once stability is</text>
  <text x="275" y="248" text-anchor="middle" font-size="11" fill="#42613B">established.</text>

  <rect x="372" y="78" width="158" height="226" rx="3" fill="#F3F1EC" stroke="#5B5A55" stroke-width="0.75"/>
  <rect x="372" y="78" width="158" height="38" rx="3" fill="#DEDCD3" stroke="none"/>
  <rect x="372" y="104" width="158" height="12" rx="0" fill="#DEDCD3" stroke="none"/>
  <text x="451" y="101" text-anchor="middle" font-size="12" font-weight="700" fill="#282824">6-signal grading</text>
  <text x="451" y="136" text-anchor="middle" font-size="11" fill="#5B5A55">Answer correctness</text>
  <text x="451" y="154" text-anchor="middle" font-size="11" fill="#5B5A55">Reasoning steps</text>
  <text x="451" y="172" text-anchor="middle" font-size="11" fill="#5B5A55">Chain consistency</text>
  <text x="451" y="190" text-anchor="middle" font-size="11" fill="#5B5A55">Symbolic arithmetic</text>
  <text x="451" y="208" text-anchor="middle" font-size="11" fill="#5B5A55">Format quality</text>
  <text x="451" y="226" text-anchor="middle" font-size="11" fill="#5B5A55">Question quality</text>
  <text x="451" y="248" text-anchor="middle" font-size="11" fill="#5B5A55">(self-play only)</text>

  <rect x="548" y="78" width="152" height="226" rx="3" fill="#F0EEF7" stroke="#5E587A" stroke-width="0.75"/>
  <rect x="548" y="78" width="152" height="38" rx="3" fill="#D8D3EA" stroke="none"/>
  <rect x="548" y="104" width="152" height="12" rx="0" fill="#D8D3EA" stroke="none"/>
  <text x="624" y="101" text-anchor="middle" font-size="12" font-weight="600" fill="#37324A">GRPO</text>
  <text x="624" y="136" text-anchor="middle" font-size="11" fill="#5E587A">Reinforces best</text>
  <text x="624" y="154" text-anchor="middle" font-size="11" fill="#5E587A">reasoning within</text>
  <text x="624" y="172" text-anchor="middle" font-size="11" fill="#5E587A">each problem</text>
  <text x="624" y="190" text-anchor="middle" font-size="11" fill="#5E587A">group. Scores are</text>
  <text x="624" y="208" text-anchor="middle" font-size="11" fill="#5E587A">relative - not</text>
  <text x="624" y="226" text-anchor="middle" font-size="11" fill="#5E587A">absolute. Contrast</text>
  <text x="624" y="244" text-anchor="middle" font-size="11" fill="#5E587A">drives learning.</text>

  <!-- Bottom summary bar -->
  <rect x="20" y="324" width="680" height="46" rx="3" fill="#ECF4EA" stroke="#587A4A" stroke-width="0.75"/>
  <text x="360" y="344" text-anchor="middle" font-size="13" font-weight="600" fill="#2F4A2A">Goal: reasoning and answer always agree</text>
  <text x="360" y="362" text-anchor="middle" font-size="11" fill="#42613B">Not just the right number: the reasoning path has to support it</text>

</g>
</svg>
