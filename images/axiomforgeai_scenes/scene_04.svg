<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="6 22 708 360" width="708" height="360">
<defs>
  <!-- Arrow marker -->
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6F6C66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4D6F93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#42613B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#716A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Total duration: 10 scenes × 6s = 60s loop -->
  <!-- Each scene: visible 0s–6s within its window, crossfade 0.4s in/out -->
  <!-- Scene offsets (in 60s total): S1=0, S2=6, S3=12, S4=18, S5=24, S6=30, S7=36, S8=42, S9=48, S10=54 -->

  <style>
    text { font-family: Inter, Arial, sans-serif; }
  </style>
</defs>
<g>
  <rect x="96" y="24" width="528" height="46" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>

  <text x="360" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#171715">K attempts per problem</text>
  <text x="360" y="62" text-anchor="middle" font-size="12" fill="#55524D">The model samples several solution paths instead of betting on one answer</text>

  <!-- Problem box -->
  <rect x="248" y="78" width="224" height="46" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>
  <text x="360" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1D">Selected problem</text>
  <text x="360" y="118" text-anchor="middle" font-size="11" fill="#55524D">Grounded or self-play source</text>

  <!-- Fan arrows -->
  <path d="M316 124 L104 184" fill="none" stroke="#4D6F93" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <path d="M338 124 L248 184" fill="none" stroke="#4D6F93" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <path d="M382 124 L472 184" fill="none" stroke="#4D6F93" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <path d="M404 124 L616 184" fill="none" stroke="#4D6F93" stroke-width="1.2" marker-end="url(#arr-blue)"/>

  <!-- 4 attempt cards -->
  <rect x="24" y="184" width="160" height="138" rx="3" fill="#EAF0F7" stroke="#355C7D" stroke-width="0.75"/>
  <text x="104" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#1F3D59">Attempt 1</text>
  <text x="104" y="228" text-anchor="middle" font-size="11" fill="#355C7D">Step 1: 3x+6=15</text>
  <text x="104" y="246" text-anchor="middle" font-size="11" fill="#355C7D">Step 2: 3x=9</text>
  <text x="104" y="264" text-anchor="middle" font-size="11" fill="#355C7D">Step 3: x=3</text>
  <rect x="40" y="276" width="128" height="26" rx="3" fill="#E0E8F2" stroke="#B8C9DC" stroke-width="0.5"/>
  <text x="104" y="293" text-anchor="middle" font-size="12" font-weight="600" fill="#304E72">Answer: x = 3</text>

  <rect x="200" y="184" width="160" height="138" rx="3" fill="#EAF0F7" stroke="#355C7D" stroke-width="0.75"/>
  <text x="280" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#1F3D59">Attempt 2</text>
  <text x="280" y="228" text-anchor="middle" font-size="11" fill="#355C7D">Step 1: subtract 6</text>
  <text x="280" y="246" text-anchor="middle" font-size="11" fill="#355C7D">Step 2: divide by 3</text>
  <text x="280" y="264" text-anchor="middle" font-size="11" fill="#355C7D">Step 3: x=5</text>
  <rect x="216" y="276" width="128" height="26" rx="3" fill="#F5E6E3" stroke="#D7A39D" stroke-width="0.5"/>
  <text x="280" y="293" text-anchor="middle" font-size="12" font-weight="600" fill="#7A3B36">Answer: x = 5</text>

  <rect x="376" y="184" width="160" height="138" rx="3" fill="#EAF0F7" stroke="#355C7D" stroke-width="0.75"/>
  <text x="456" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#1F3D59">Attempt 3</text>
  <text x="456" y="228" text-anchor="middle" font-size="11" fill="#355C7D">Step 1: 3x = 15−6</text>
  <text x="456" y="246" text-anchor="middle" font-size="11" fill="#355C7D">Step 2: 3x = 9</text>
  <text x="456" y="264" text-anchor="middle" font-size="11" fill="#355C7D">Step 3: x = 3</text>
  <rect x="392" y="276" width="128" height="26" rx="3" fill="#E0E8F2" stroke="#B8C9DC" stroke-width="0.5"/>
  <text x="456" y="293" text-anchor="middle" font-size="12" font-weight="600" fill="#304E72">Answer: x = 3</text>

  <rect x="552" y="184" width="144" height="138" rx="3" fill="#EAF0F7" stroke="#355C7D" stroke-width="0.75"/>
  <text x="624" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#1F3D59">Attempt 4</text>
  <text x="624" y="228" text-anchor="middle" font-size="11" fill="#355C7D">probably 3</text>
  <text x="624" y="246" text-anchor="middle" font-size="11" fill="#355C7D">seems right</text>
  <text x="624" y="264" text-anchor="middle" font-size="11" fill="#355C7D">I think 3</text>
  <rect x="568" y="276" width="112" height="26" rx="3" fill="#F5EFD1" stroke="#D6C987" stroke-width="0.5"/>
  <text x="624" y="293" text-anchor="middle" font-size="12" font-weight="600" fill="#705832">Answer: x = 3 ?</text>

  <text x="360" y="364" text-anchor="middle" font-size="12" fill="#55524D">Same problem, four different paths - some solid, some shaky</text>

</g>
</svg>
