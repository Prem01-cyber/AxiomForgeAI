<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="12 22 696 356" width="696" height="356">
<defs>
  <!-- Arrow marker -->
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6F6C66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4D6F93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#42613B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#716A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Total duration: 10 scenes × 6s = 60s loop -->
  <!-- Each scene: visible 0s–6s within its window, crossfade 0.4s in/out -->
  <!-- Scene offsets (in 60s total): S1=0, S2=6, S3=12, S4=18, S5=24, S6=30, S7=36, S8=42, S9=48, S10=54 -->

  <style>
    text { font-family: Inter, Arial, sans-serif; }
  </style>
</defs>
<g>
  <rect x="96" y="24" width="528" height="46" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>

  <text x="360" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#171715">Shared grading - 6 signals</text>
  <text x="360" y="62" text-anchor="middle" font-size="12" fill="#55524D">Each attempt is checked from multiple angles simultaneously</text>

  <!-- Header box -->
  <rect x="220" y="76" width="280" height="44" rx="3" fill="#F3F1EC" stroke="#6F6C66" stroke-width="0.75"/>
  <text x="360" y="103" text-anchor="middle" font-size="13" font-weight="600" fill="#2F2F2C">Shared grading stage</text>

  <!-- 6 criteria in 2 rows of 3 -->
  <rect x="30"  y="144" width="200" height="58" rx="3" fill="#F3F1EC" stroke="#5B5A55" stroke-width="0.5"/>
  <text x="130" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="#282824">Final answer check</text>
  <text x="130" y="185" text-anchor="middle" font-size="10" fill="#5B5A55">Gold answer match (grounded)</text>

  <rect x="260" y="144" width="200" height="58" rx="3" fill="#F3F1EC" stroke="#5B5A55" stroke-width="0.5"/>
  <text x="360" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="#282824">Reasoning steps</text>
  <text x="360" y="185" text-anchor="middle" font-size="10" fill="#5B5A55">Process reward model quality</text>

  <rect x="490" y="144" width="200" height="58" rx="3" fill="#F3F1EC" stroke="#5B5A55" stroke-width="0.5"/>
  <text x="590" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="#282824">Chain consistency</text>
  <text x="590" y="185" text-anchor="middle" font-size="10" fill="#5B5A55">Steps support final answer</text>

  <rect x="30"  y="224" width="200" height="58" rx="3" fill="#F3F1EC" stroke="#5B5A55" stroke-width="0.5"/>
  <text x="130" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="#282824">Symbolic arithmetic</text>
  <text x="130" y="265" text-anchor="middle" font-size="10" fill="#5B5A55">Verify computations directly</text>

  <rect x="260" y="224" width="200" height="58" rx="3" fill="#F3F1EC" stroke="#5B5A55" stroke-width="0.5"/>
  <text x="360" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="#282824">Format + parseability</text>
  <text x="360" y="265" text-anchor="middle" font-size="10" fill="#5B5A55">Answer is well-formed</text>

  <rect x="490" y="224" width="200" height="58" rx="3" fill="#F0EEF7" stroke="#5E587A" stroke-width="0.75"/>
  <text x="590" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="#3C3657">Question quality</text>
  <text x="590" y="265" text-anchor="middle" font-size="10" fill="#5E587A">Self-play: clarity, novelty, fit</text>

  <!-- Arrow to scores -->
  <line x1="360" y1="282" x2="360" y2="316" stroke="#6F6C66" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="236" y="316" width="248" height="44" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>
  <text x="360" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1D">Scores per attempt</text>

</g>
</svg>
