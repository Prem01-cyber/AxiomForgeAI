<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="42 82 636 236" width="636" height="236">
<defs>
  <!-- Arrow marker -->
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6F6C66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4D6F93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#42613B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#716A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Total duration: 10 scenes × 6s = 60s loop -->
  <!-- Each scene: visible 0s–6s within its window, crossfade 0.4s in/out -->
  <!-- Scene offsets (in 60s total): S1=0, S2=6, S3=12, S4=18, S5=24, S6=30, S7=36, S8=42, S9=48, S10=54 -->

  <style>
    text { font-family: Inter, Arial, sans-serif; }
  </style>
</defs>
<g>

  <!-- Left card: Good steps, wrong answer -->
  <rect x="60" y="100" width="268" height="200" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="1"/>
  <rect x="60" y="100" width="268" height="36" rx="3" fill="#F5E6E3" stroke="none"/>
  <rect x="60" y="124" width="268" height="12" rx="0" fill="#F5E6E3" stroke="none"/>
  <text x="194" y="123" text-anchor="middle" font-size="13" font-weight="600" fill="#7A3B36">Plausible steps / wrong answer</text>
  <text x="100" y="162" font-size="12" fill="#343330">Step 1:  3x + 6 = 15</text>
  <text x="100" y="182" font-size="12" fill="#343330">Step 2:  3x = 9</text>
  <text x="100" y="202" font-size="12" fill="#343330">Step 3:  x = 5  (arithmetic error)</text>
  <rect x="80" y="220" width="228" height="34" rx="3" fill="#FAF0EE" stroke="#D7A39D" stroke-width="0.5"/>
  <text x="194" y="241" text-anchor="middle" font-size="13" font-weight="600" fill="#7A3B36">Answer: x = 5  wrong</text>
  <text x="194" y="284" text-anchor="middle" font-size="11" fill="#6F6C66">Steps look fine but answer is wrong</text>

  <!-- Right card: Right answer, weak reasoning -->
  <rect x="392" y="100" width="268" height="200" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="1"/>
  <rect x="392" y="100" width="268" height="36" rx="3" fill="#F5EFD1" stroke="none"/>
  <rect x="392" y="124" width="268" height="12" rx="0" fill="#F5EFD1" stroke="none"/>
  <text x="526" y="123" text-anchor="middle" font-size="13" font-weight="600" fill="#705832">Right answer / weak reasoning</text>
  <text x="432" y="162" font-size="12" fill="#343330">Step 1:  probably around 3</text>
  <text x="432" y="182" font-size="12" fill="#343330">Step 2:  I think x is 3</text>
  <text x="432" y="202" font-size="12" fill="#343330">Step 3:  seems correct</text>
  <rect x="412" y="220" width="228" height="34" rx="3" fill="#F3F8F2" stroke="#CFE3D4" stroke-width="0.5"/>
  <text x="526" y="241" text-anchor="middle" font-size="13" font-weight="600" fill="#31543A">Answer: x = 3  correct</text>
  <text x="526" y="284" text-anchor="middle" font-size="11" fill="#6F6C66">Answer is right but reasoning is weak</text>

</g>
</svg>
