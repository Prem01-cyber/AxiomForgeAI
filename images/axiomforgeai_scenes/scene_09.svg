<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="92 22 536 371" width="536" height="371">
<defs>
  <!-- Arrow marker -->
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6F6C66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4D6F93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#42613B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#716A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Total duration: 10 scenes × 6s = 60s loop -->
  <!-- Each scene: visible 0s–6s within its window, crossfade 0.4s in/out -->
  <!-- Scene offsets (in 60s total): S1=0, S2=6, S3=12, S4=18, S5=24, S6=30, S7=36, S8=42, S9=48, S10=54 -->

  <style>
    text { font-family: Inter, Arial, sans-serif; }
  </style>
</defs>
<g>
  <rect x="96" y="24" width="528" height="46" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>

  <text x="360" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#171715">Why it matters</text>
  <text x="360" y="62" text-anchor="middle" font-size="12" fill="#55524D">The answer should follow from the reasoning - not just appear at the end</text>

  <!-- Final solution card -->
  <rect x="110" y="82" width="500" height="258" rx="3" fill="#F3F8F2" stroke="#587A4A" stroke-width="1.5"/>
  <text x="360" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#2F4A2A">Solution where steps and answer agree</text>

  <!-- Reasoning path -->
  <rect x="130" y="124" width="200" height="188" rx="3" fill="#FBFAF7" stroke="#CFE3D4" stroke-width="0.75"/>
  <text x="230" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#263F24">Reasoning path</text>
  <text x="230" y="174" text-anchor="middle" font-size="12" fill="#42613B">Step 1:  3x + 6 = 15</text>
  <text x="230" y="194" text-anchor="middle" font-size="12" fill="#42613B">Step 2:  3x = 9</text>
  <text x="230" y="214" text-anchor="middle" font-size="12" fill="#42613B">Step 3:  x = 3</text>
  <line x1="150" y1="228" x2="310" y2="228" stroke="#CFE3D4" stroke-width="0.5"/>
  <text x="230" y="252" text-anchor="middle" font-size="11" fill="#42613B">Arithmetic: verified</text>
  <text x="230" y="270" text-anchor="middle" font-size="11" fill="#42613B">Chain: consistent</text>
  <text x="230" y="290" text-anchor="middle" font-size="11" fill="#42613B">Format: parseable</text>

  <!-- Green arrow connecting -->
  <line x1="330" y1="218" x2="390" y2="218" stroke="#5E8B68" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="360" y="212" text-anchor="middle" font-size="10" fill="#42613B">follows</text>

  <!-- Final answer -->
  <rect x="390" y="124" width="200" height="188" rx="3" fill="#FBFAF7" stroke="#CFE3D4" stroke-width="0.75"/>
  <text x="490" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#263F24">Final answer</text>
  <text x="490" y="210" text-anchor="middle" font-size="40" font-weight="700" fill="#42613B">x=3</text>
  <line x1="410" y1="240" x2="570" y2="240" stroke="#CFE3D4" stroke-width="0.5"/>
  <text x="490" y="264" text-anchor="middle" font-size="11" fill="#42613B">Matches the checked answer</text>
  <text x="490" y="282" text-anchor="middle" font-size="11" fill="#42613B">Follows from the steps</text>

  <text x="360" y="375" text-anchor="middle" font-size="12" fill="#5E587A" font-weight="500">Not just the right number: the reasoning path has to support it</text>

</g>
</svg>
