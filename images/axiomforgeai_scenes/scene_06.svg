<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="2 22 718 376" width="718" height="376">
<defs>
  <!-- Arrow marker -->
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6F6C66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4D6F93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#42613B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#716A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Total duration: 10 scenes × 6s = 60s loop -->
  <!-- Each scene: visible 0s–6s within its window, crossfade 0.4s in/out -->
  <!-- Scene offsets (in 60s total): S1=0, S2=6, S3=12, S4=18, S5=24, S6=30, S7=36, S8=42, S9=48, S10=54 -->

  <style>
    text { font-family: Inter, Arial, sans-serif; }
  </style>
</defs>
<g>
  <rect x="96" y="24" width="528" height="46" rx="3" fill="#FBFAF7" stroke="#D6D1C8" stroke-width="0.75"/>

  <text x="360" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#171715">Group comparison</text>
  <text x="360" y="62" text-anchor="middle" font-size="12" fill="#55524D">GRPO asks which attempt worked best within the group - not in isolation</text>

  <!-- 4 attempt cards with scores -->
  <!-- Attempt 1 – weak -->
  <rect x="20" y="88" width="148" height="158" rx="3" fill="#EAF0F7" stroke="#D7E3F1" stroke-width="0.75" opacity="0.6"/>
  <text x="94" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1F3D59">Attempt 1</text>
  <text x="94" y="132" text-anchor="middle" font-size="11" fill="#355C7D">Answer: wrong</text>
  <text x="94" y="150" text-anchor="middle" font-size="11" fill="#355C7D">Steps: partial</text>
  <text x="94" y="170" text-anchor="middle" font-size="11" fill="#355C7D">Chain: weak</text>
  <rect x="36" y="188" width="116" height="28" rx="3" fill="#F5E6E3" stroke="#D7A39D" stroke-width="0.5" opacity="0.6"/>
  <text x="94" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#7A3B36">Score: 0.31</text>

  <!-- Attempt 2 – mid -->
  <rect x="184" y="88" width="148" height="158" rx="3" fill="#EAF0F7" stroke="#D7E3F1" stroke-width="0.75" opacity="0.65"/>
  <text x="258" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1F3D59">Attempt 2</text>
  <text x="258" y="132" text-anchor="middle" font-size="11" fill="#355C7D">Answer: correct</text>
  <text x="258" y="150" text-anchor="middle" font-size="11" fill="#355C7D">Steps: weak</text>
  <text x="258" y="170" text-anchor="middle" font-size="11" fill="#355C7D">Chain: poor</text>
  <rect x="200" y="188" width="116" height="28" rx="3" fill="#F5EFD1" stroke="#D6C987" stroke-width="0.5" opacity="0.65"/>
  <text x="258" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#705832">Score: 0.58</text>

  <!-- Attempt 3 – BEST (highlighted, full opacity) -->
  <rect x="366" y="72" width="172" height="182" rx="3" fill="#ECF4EA" stroke="#587A4A" stroke-width="1.5"/>
  <rect x="366" y="72" width="172" height="28" rx="3" fill="#CFE3D4" stroke="none"/>
  <rect x="366" y="88" width="172" height="12" rx="0" fill="#CFE3D4" stroke="none"/>
  <text x="452" y="91" text-anchor="middle" font-size="11" font-weight="600" fill="#31543A">Best in group</text>
  <text x="452" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#2F4A2A">Attempt 3</text>
  <text x="452" y="140" text-anchor="middle" font-size="12" fill="#42613B">Answer: correct</text>
  <text x="452" y="159" text-anchor="middle" font-size="12" fill="#42613B">Steps: consistent</text>
  <text x="452" y="178" text-anchor="middle" font-size="12" fill="#42613B">Chain: solid</text>
  <rect x="384" y="196" width="136" height="30" rx="3" fill="#DDEACF" stroke="#42613B" stroke-width="0.75"/>
  <text x="452" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#24381F">Score: 0.91</text>

  <!-- Attempt 4 – weak -->
  <rect x="554" y="88" width="148" height="158" rx="3" fill="#EAF0F7" stroke="#D7E3F1" stroke-width="0.75" opacity="0.55"/>
  <text x="628" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1F3D59">Attempt 4</text>
  <text x="628" y="132" text-anchor="middle" font-size="11" fill="#355C7D">Answer: wrong</text>
  <text x="628" y="150" text-anchor="middle" font-size="11" fill="#355C7D">Steps: wrong</text>
  <text x="628" y="170" text-anchor="middle" font-size="11" fill="#355C7D">Chain: none</text>
  <rect x="570" y="188" width="116" height="28" rx="3" fill="#F5E6E3" stroke="#D7A39D" stroke-width="0.5" opacity="0.55"/>
  <text x="628" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#7A3B36">Score: 0.24</text>

  <!-- GRPO box -->
  <rect x="168" y="292" width="384" height="52" rx="3" fill="#F0EEF7" stroke="#5E587A" stroke-width="0.75"/>
  <text x="360" y="316" text-anchor="middle" font-size="14" font-weight="600" fill="#46405F">Group comparison (GRPO)</text>
  <text x="360" y="334" text-anchor="middle" font-size="11" fill="#5E587A">Scores are normalized within the problem group</text>

  <text x="360" y="380" text-anchor="middle" font-size="12" fill="#55524D">The winner is relative - weaker attempts are discounted, not ignored</text>

</g>
</svg>
